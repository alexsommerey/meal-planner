# cargo-deny — dep auditor for licenses, advisories, bans, and sources.
# Strict configuration: any finding fails CI so supply-chain/legal
# surprises surface at PR time instead of in production.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
# Workspace crates are `publish = false`, so skip them here — they'd
# otherwise flag as unlicensed and never will be.
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"
# `{ workspace = true }` and `path = "…"` deps read as wildcards to
# cargo-deny. Whitelist them so the ban only catches external crates.
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
