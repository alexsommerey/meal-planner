services:
  # Shared across profiles — no profile means always started.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (app exports here)
      - "4318:4318"   # OTLP HTTP (unused but standard)
      - "8889:8889"   # prometheus exporter (scraped by prom)

  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: [traces]
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI — http://localhost:16686

  prometheus:
    image: prom/prometheus:latest
    profiles: [metrics]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # UI — http://localhost:9090
